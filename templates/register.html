<!DOCTYPE html>
<html>
<head>
  <title>Register Players</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 24px;
    }

    .panel {
      background: #1c1c1c;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 16px;
    }

    .member-list {
      max-height: 650px;
      overflow-y: auto;
    }

    label {
      display: block;
      margin: 6px 0;
    }

    textarea {
      width: 100%;
      height: 250px;
      background: #050505;
      color: white;
      border: 1px solid #555;
      border-radius: 8px;
      padding: 10px;
      resize: vertical;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>Register Players</h1>

  <form method="POST">
    <div class="layout">

      <div class="panel">
        <h2>Member Players</h2>
        <div class="member-list">
          {% for member in members %}
            <label>
              <input
                type="checkbox"
                name="members"
                value="{{ member }}"
                {% if member in initial_signups %}checked{% endif %}
              >
              {{ member }}
            </label>
          {% endfor %}
        </div>
      </div>

      <div class="panel">
        <h2>New Players</h2>
        <p>Used when generating the initial comp.</p>

        <textarea name="new_players"></textarea>
        </div>

        <div class="panel">
        <h2>Late Players</h2>
        <p>Added into empty first-round slots without resetting the comp.</p>

        <textarea name="late_players"></textarea>
        </div>

        <div class="panel">
        <h2>Buybacks</h2>
        <p>Added into empty first-round slots with an automatic asterisk.</p>

        <textarea name="buybacks"></textarea>
        </div>

        </div>

        <button type="submit" name="action" value="generate">
        Generate Initial Comp
        </button>

        <button type="submit" name="action" value="add_late">
        Add Late Players
        </button>

        <button type="submit" name="action" value="add_buybacks">
        Add Buybacks
        </button>
  </form>
</body>
</html>
