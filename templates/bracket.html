<!DOCTYPE html>
<html>
<head>
  <title>64 Player Split Bracket - Compact Line Style</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #050505;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .bracket {
      position: absolute;
      left: 0;
      top: 0;
      width: 1200px;
      height: 760px;
      margin: 0;
      transform-origin: top left;
    }

    svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    path {
      fill: none;
      stroke: #d7d7d7;
      stroke-width: 1;
      shape-rendering: crispEdges;
    }

    .slot {
      position: absolute;
      width: 95px;
      height: 18px;
      z-index: 2;
    }

    .name {
      position: absolute;
      left: 3px;
      bottom: 4px;
      font-size: 9px;
      white-space: nowrap;
      color: #f2f2f2;
      text-shadow: 0 1px 2px black;
    }

    .champion {
      position: absolute;
      width: 130px;
      height: 22px;
      text-align: center;
      font-size: 13px;
      font-weight: bold;
      color: white;
      border-bottom: 1.5px solid #ffffff;
      z-index: 2;
    }

    .final-label {
      position: absolute;
      width: 130px;
      text-align: center;
      font-size: 11px;
      color: #aaa;
    }

    .slot {
      cursor: pointer;
    }

    .name:hover {
      color: #7CFF7C;
    }

    .first-round-removable .name:hover {
      color: #ff7c7c;
    }

    .active-match .name {
      color: #7CFF7C;
      font-weight: bold;
    }

    .table-badge {
      position: absolute;
      right: -24px;
      bottom: 2px;
      font-size: 9px;
      font-weight: bold;
      color: #050505;
      background: #7CFF7C;
      padding: 1px 4px;
      border-radius: 4px;
    }
  </style>
</head>

<body>

<div class="bracket" id="bracket">
  <svg id="lines"></svg>

  <div class="final-label" id="final-label">GRAND FINAL</div>
  <div class="champion" id="champion">Champion</div>
</div>

<script>
const activeMatchIds = new Set();
const MAX_ACTIVE_MATCHES = 3;
const bracketData = {{ bracket_data | tojson }};
console.log("bracketData:", bracketData);

const bracket = document.getElementById("bracket");
const svg = document.getElementById("lines");
const winners = {};
const champion = document.getElementById("champion");
const finalLabel = document.getElementById("final-label");
const undoStack = [];

const DESIGN_W = 1200;
const DESIGN_H = 760;

// Keep this tiny so the bracket fills the fullscreen browser as much as possible.
const FIT_PADDING = 4;

function getBracketContentBounds() {
  const bounds = [];

  document.querySelectorAll(".slot, .champion, .final-label").forEach(el => {
    bounds.push({
      left: el.offsetLeft,
      top: el.offsetTop,
      right: el.offsetLeft + el.offsetWidth,
      bottom: el.offsetTop + el.offsetHeight
    });
  });

  svg.querySelectorAll("path").forEach(path => {
    try {
      const box = path.getBBox();
      bounds.push({
        left: box.x,
        top: box.y,
        right: box.x + box.width,
        bottom: box.y + box.height
      });
    } catch (err) {
      // Ignore paths that are not measurable yet.
    }
  });

  if (!bounds.length) {
    return { left: 0, top: 0, width: DESIGN_W, height: DESIGN_H };
  }

  const left = Math.min(...bounds.map(b => b.left));
  const top = Math.min(...bounds.map(b => b.top));
  const right = Math.max(...bounds.map(b => b.right));
  const bottom = Math.max(...bounds.map(b => b.bottom));

  return {
    left,
    top,
    width: right - left,
    height: bottom - top
  };
}

function fitBracketToScreen() {
  const content = getBracketContentBounds();
  const availableW = Math.max(window.innerWidth - FIT_PADDING * 2, 1);
  const availableH = Math.max(window.innerHeight - FIT_PADDING * 2, 1);

  // Scale from the actual drawn bracket bounds, not the old 1200x760 design box.
  // This removes the dead space and makes the bracket visibly bigger.
  const scale = Math.min(availableW / content.width, availableH / content.height);

  const left = Math.floor((window.innerWidth - content.width * scale) / 2 - content.left * scale);
  const top = Math.floor((window.innerHeight - content.height * scale) / 2 - content.top * scale);

  bracket.style.transform = `translate(${left}px, ${top}px) scale(${scale})`;
}


const SLOT_W = 52;
const SLOT_H = 18;

const START_Y = 35;
const BASE_GAP = 20;

const BRACKET_CENTER_Y = START_Y + ((32 - 1) / 2) * BASE_GAP + SLOT_H;

champion.style.top = (BRACKET_CENTER_Y - champion.offsetHeight) + "px";
finalLabel.style.top = (BRACKET_CENTER_Y - 65) + "px";

const leftXs  = [30, 115, 200, 285, 370, 455];
const rightXs = [1095, 1010, 925, 840, 755, 670];

const FINAL_W = 130;

const leftFinalLineEnd = leftXs[5] + SLOT_W;
const rightFinalLineEnd = rightXs[5];

const FINAL_CENTER_X = (leftFinalLineEnd + rightFinalLineEnd) / 2;

champion.style.left = (FINAL_CENTER_X - FINAL_W / 2) + "px";
finalLabel.style.left = (FINAL_CENTER_X - FINAL_W / 2) + "px";

const rounds = [32, 16, 8, 4, 2, 1];

function createSlot(id, x, y, name) {
  const div = document.createElement("div");
  div.className = "slot";
  div.id = id;
  div.dataset.name = name || "";

  const [, roundIndex] = id.split("-");
  if (roundIndex === "0") {
    div.classList.add("first-round-removable");
    div.title = "Right-click to remove this first-round player";
  }

  div.style.left = x + "px";
  div.style.top = y + "px";

  div.innerHTML = `
    <div class="name">${name || ""}</div>
  `;

  div.addEventListener("click", () => {
    handleSlotClick(id);
  });

  div.addEventListener("contextmenu", (event) => {
    handleSlotRightClick(event, id);
  });

  bracket.appendChild(div);
}

async function handleSlotRightClick(event, slotId) {
  event.preventDefault();

  const [side, roundIndex] = slotId.split("-");

  if (roundIndex !== "0") return;

  const slot = document.getElementById(slotId);
  const playerName = slot?.dataset.name || "";

  if (!playerName) return;

  const ok = confirm(`Remove ${playerName} from this first-round slot? The next late player you add will fill this position first.`);
  if (!ok) return;

  const response = await fetch("/remove_first_round_player", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ slot_id: slotId })
  });

  const result = await response.json().catch(() => ({}));

  if (!response.ok || !result.success) {
    alert(result.error || "Could not remove player.");
    return;
  }

  slot.dataset.name = "";
  slot.querySelector(".name").textContent = "";

  const matchId = getMatchTopSlotId(slotId);
  if (activeMatchIds.has(matchId)) {
    clearActiveMatch(matchId);
  }
}

function saveBracketState() {
  const firstRound = [];

  for (let i = 0; i < 32; i++) {
    const slot = document.getElementById(`L-0-${i}`);
    firstRound.push(slot?.dataset.name || "");
  }

  for (let i = 0; i < 32; i++) {
    const slot = document.getElementById(`R-0-${i}`);
    firstRound.push(slot?.dataset.name || "");
  }

  const state = {
    left: firstRound.slice(0, 32),
    right: firstRound.slice(32, 64),
    advancements: {},
    active_matches: [...activeMatchIds]
  };

  document.querySelectorAll(".slot").forEach(slot => {
    state.advancements[slot.id] = slot.dataset.name || "";
  });

  fetch("/save_bracket", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(state)
  });
}

function markActiveMatches() {
  Object.entries(activeTables).forEach(([topSlotId, tableNumber]) => {
    const [side, round, slot] = topSlotId.split("-");
    const bottomSlotId = `${side}-${round}-${Number(slot) + 1}`;

    const top = document.getElementById(topSlotId);
    const bottom = document.getElementById(bottomSlotId);

    top.classList.add("active-match");
    bottom.classList.add("active-match");

    const badge = document.createElement("div");
    badge.className = "table-badge";
    badge.textContent = `T${tableNumber}`;
    top.appendChild(badge);
  });
  saveBracketState();
}

function getMatchTopSlotId(slotId) {
  const [sidePrefix, roundIndex, slotIndex] = slotId.split("-");
  const s = Number(slotIndex);

  const topSlotIndex = s % 2 === 0 ? s : s - 1;

  return `${sidePrefix}-${roundIndex}-${topSlotIndex}`;
}

function getMatchSlotIds(slotId) {
  const topSlotId = getMatchTopSlotId(slotId);
  const [sidePrefix, roundIndex, topSlotIndex] = topSlotId.split("-");

  return [
    topSlotId,
    `${sidePrefix}-${roundIndex}-${Number(topSlotIndex) + 1}`
  ];
}

function clearActiveMatch(matchId = null) {
  if (matchId === null) {
    document.querySelectorAll(".active-match").forEach(el => {
      el.classList.remove("active-match");
    });

    activeMatchIds.clear();
    return;
  }

  const [topSlotId, bottomSlotId] = getMatchSlotIds(matchId);

  document.getElementById(topSlotId)?.classList.remove("active-match");
  document.getElementById(bottomSlotId)?.classList.remove("active-match");

  activeMatchIds.delete(matchId);
  saveBracketState();
}

function markMatchActive(slotId) {
  const matchTopSlotId = getMatchTopSlotId(slotId);

  if (activeMatchIds.has(matchTopSlotId)) return;

  if (activeMatchIds.size >= MAX_ACTIVE_MATCHES) {
    alert("Maximum 3 active games at once.");
    return;
  }

  undoStack.push({
    type: "active-match",
    matchId: matchTopSlotId,
    wasActive: false
  });

  const [topSlotId, bottomSlotId] = getMatchSlotIds(slotId);

  document.getElementById(topSlotId)?.classList.add("active-match");
  document.getElementById(bottomSlotId)?.classList.add("active-match");

  activeMatchIds.add(matchTopSlotId);
  saveBracketState();
}

function handleSlotClick(slotId) {
  const clickedSlot = document.getElementById(slotId);
  const clickedName = clickedSlot.dataset.name;

  if (!clickedName) return;

  const clickedMatchId = getMatchTopSlotId(slotId);

  if (!activeMatchIds.has(clickedMatchId)) {
    markMatchActive(slotId);
    return;
  }

  advanceWinner(slotId);
  clearActiveMatch(clickedMatchId);
}

function addPlayersToFirstEmptySlots(players) {
  const cleanPlayers = players
    .map(name => name.trim())
    .filter(name => name);

  const firstRoundSlots = Array.from(
    document.querySelectorAll(".slot")
  ).filter(slot => {
    const parts = slot.id.split("-");
    return parts[1] === "0";
  });

  const emptySlots = firstRoundSlots.filter(slot => !slot.dataset.name);

  const playersToAdd = cleanPlayers.slice(0, emptySlots.length);

  playersToAdd.forEach((name, index) => {
    const slot = emptySlots[index];

    undoStack.push({
      type: "add-player",
      slotId: slot.id,
      previousName: slot.dataset.name || ""
    });

    slot.dataset.name = name;
    slot.querySelector(".name").textContent = name;
  });
  saveBracketState();
}

function advanceWinner(slotId) {
  const parts = slotId.split("-");
  const sidePrefix = parts[0];
  const roundIndex = Number(parts[1]);
  const slotIndex = Number(parts[2]);

  const currentSlot = document.getElementById(slotId);
  const winnerName = currentSlot.dataset.name;

  if (!winnerName) return;

  if (roundIndex >= rounds.length - 1) {
    undoStack.push({
      type: "champion",
      previousChampion: champion.textContent
    });

    champion.textContent = winnerName;
    return;
  }

  const nextSlotId = `${sidePrefix}-${roundIndex + 1}-${Math.floor(slotIndex / 2)}`;
  const nextSlot = document.getElementById(nextSlotId);

  undoStack.push({
    type: "advance",
    targetSlotId: nextSlotId,
    previousName: nextSlot.dataset.name || ""
  });

  nextSlot.dataset.name = winnerName;
  nextSlot.querySelector(".name").textContent = winnerName;
  saveBracketState();
}

function undoLastAction() {
  const lastAction = undoStack.pop();

  if (!lastAction) return;

  if (lastAction.type === "active-match") {
    if (lastAction.wasActive) {
      clearActiveMatch(lastAction.matchId);
    } else {
      const [topSlotId, bottomSlotId] = getMatchSlotIds(lastAction.matchId);

      document.getElementById(topSlotId)?.classList.add("active-match");
      document.getElementById(bottomSlotId)?.classList.add("active-match");

      activeMatchIds.add(lastAction.matchId);
    }

    return;
  }

  if (lastAction.type === "advance") {
    const slot = document.getElementById(lastAction.targetSlotId);

    slot.dataset.name = lastAction.previousName;
    slot.querySelector(".name").textContent = lastAction.previousName;
  }

  if (lastAction.type === "champion") {
    champion.textContent = lastAction.previousChampion;
  }

  if (lastAction.type === "add-player") {
    const slot = document.getElementById(lastAction.slotId);

    slot.dataset.name = lastAction.previousName;
    slot.querySelector(".name").textContent = lastAction.previousName;

    return;
  }

  clearActiveMatch();
  saveBracketState();
}

function slotPoint(id, side) {
  const el = document.getElementById(id);

  return {
    x: side === "left" ? el.offsetLeft + SLOT_W : el.offsetLeft,
    y: el.offsetTop + SLOT_H
  };
}

function drawPath(points) {
  const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

  let d = `M ${points[0].x} ${points[0].y}`;

  for (let i = 1; i < points.length; i++) {
    d += ` L ${points[i].x} ${points[i].y}`;
  }

  path.setAttribute("d", d);
  svg.appendChild(path);
}

function slotY(roundIndex, slotIndex) {
  const groupSize = Math.pow(2, roundIndex);
  const firstSeedIndex = slotIndex * groupSize;
  const middleSeedIndex = firstSeedIndex + (groupSize - 1) / 2;

  const lineY = START_Y + middleSeedIndex * BASE_GAP + SLOT_H;

  return lineY - SLOT_H;
}

function drawMatchConnector(topId, bottomId, nextId, side) {
  const top = slotPoint(topId, side);
  const bottom = slotPoint(bottomId, side);
  const next = slotPoint(nextId, side);

  const topEl = document.getElementById(topId);
  const bottomEl = document.getElementById(bottomId);

  const topStartX = side === "left"
    ? topEl.offsetLeft
    : topEl.offsetLeft + SLOT_W;

  const bottomStartX = side === "left"
    ? bottomEl.offsetLeft
    : bottomEl.offsetLeft + SLOT_W;

  const jointX = side === "left"
    ? top.x + 18
    : top.x - 18;

  drawPath([
    { x: topStartX, y: top.y },
    { x: jointX, y: top.y },
    { x: jointX, y: bottom.y },
    { x: bottomStartX, y: bottom.y }
  ]);

  drawPath([
    { x: jointX, y: next.y },
    { x: next.x, y: next.y }
  ]);
}

function drawFinalConnector(fromId, side) {
  const from = slotPoint(fromId, side);

  const champY = BRACKET_CENTER_Y;

  const champX = side === "left"
    ? champion.offsetLeft
    : champion.offsetLeft + champion.offsetWidth;

  const jointX = side === "left"
    ? from.x + 24
    : from.x - 24;

  drawPath([
    { x: from.x, y: from.y },
    { x: jointX, y: from.y },
    { x: jointX, y: champY },
    { x: champX, y: champY }
  ]);
}

function buildSide(side, xs, players) {
  const prefix = side === "left" ? "L" : "R";

  for (let r = 0; r < rounds.length; r++) {
    for (let s = 0; s < rounds[r]; s++) {
      const id = `${prefix}-${r}-${s}`;
      const x = xs[r];
      const y = slotY(r, s);

      const name = r === 0
      ? players[s]
      : "";

      createSlot(id, x, y, name);
    }
  }

  for (let r = 0; r < rounds.length - 1; r++) {
    for (let s = 0; s < rounds[r]; s += 2) {
      drawMatchConnector(
        `${prefix}-${r}-${s}`,
        `${prefix}-${r}-${s + 1}`,
        `${prefix}-${r + 1}-${s / 2}`,
        side
      );
    }
  }
}

console.log("buildSide type:", typeof buildSide);
console.log("bracket element:", bracket);
console.log("left players:", bracketData.left.length);

try {
  console.log("building bracket...");

  buildSide("left", leftXs, bracketData.left);
  buildSide("right", rightXs, bracketData.right);

  Object.entries(bracketData.advancements || {}).forEach(([slotId, name]) => {
    const slot = document.getElementById(slotId);

    if (!slot) return;

    slot.dataset.name = name;
    slot.querySelector(".name").textContent = name;
  });

  (bracketData.active_matches || []).forEach(matchId => {
    const [topSlotId, bottomSlotId] = getMatchSlotIds(matchId);

    document.getElementById(topSlotId)?.classList.add("active-match");
    document.getElementById(bottomSlotId)?.classList.add("active-match");

    activeMatchIds.add(matchId);
  });

  drawFinalConnector("L-5-0", "left");
  drawFinalConnector("R-5-0", "right");

  console.log("bracket finished");
} catch (err) {
  console.error("Bracket render failed:", err);
}

fitBracketToScreen();
window.addEventListener("resize", fitBracketToScreen);
window.addEventListener("orientationchange", fitBracketToScreen);

// Re-fit after fonts/layout have settled, which prevents tiny clipping on some displays.
requestAnimationFrame(fitBracketToScreen);

// F11/fullscreen changes can fire without a normal resize event in some browsers.
document.addEventListener("fullscreenchange", fitBracketToScreen);

// Useful for projectors/TVs where browser chrome disappears after page load.
setTimeout(fitBracketToScreen, 250);


document.addEventListener("keydown", (event) => {
  if (event.ctrlKey && event.key.toLowerCase() === "z") {
    event.preventDefault();
    undoLastAction();
  }
});
</script>

</body>
</html>
